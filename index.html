<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala · Tiago Paulo Moreira</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0E0F13;
    --surface:  #16181F;
    --border:   #252830;
    --muted:    #3A3D4A;
    --text-dim: #6B7080;
    --text:     #C8CCD8;
    --text-hi:  #F0F2F8;

    --work:     #4A90D9;
    --work-bg:  rgba(74,144,217,.12);
    --dsr:      #3DBD8F;
    --dsr-bg:   rgba(61,189,143,.10);
    --comp:     #3DBD8F;
    --comp-bg:  rgba(61,189,143,.10);
    --folga:    #3DBD8F;
    --folga-bg: rgba(61,189,143,.10);
    --outros:   #5A6070;
    --outros-bg:rgba(90,96,112,.12);
    --today:    #D45F3C;

    --radius: 10px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; }
  body { min-height: 100vh; }

  /* ── HEADER ── */
  header {
    padding: 40px 40px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .brand-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text-hi);
    line-height: 1.1;
  }
  .brand-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 300;
  }
  .header-meta {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta-pill {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .meta-pill span:first-child {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .meta-pill span:last-child {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-hi);
  }
  .countdown-badge {
    background: linear-gradient(135deg, rgba(212,95,60,.25), rgba(212,95,60,.08));
    border: 1px solid rgba(212,95,60,.35);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
  }
  .countdown-badge .days {
    font-family: var(--font-display);
    font-size: 32px;
    color: #E8725A;
    line-height: 1;
  }
  .countdown-badge .days-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(232,114,90,.7);
    margin-top: 2px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    flex: 1;
    min-width: 110px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-card .s-num {
    font-family: var(--font-display);
    font-size: 26px;
    line-height: 1;
  }
  .stat-card .s-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .stat-card.c-work  .s-num { color: var(--work); }
  .stat-card.c-dsr   .s-num { color: var(--dsr); }
  .stat-card.c-comp  .s-num { color: var(--comp); }
  .stat-card.c-folga .s-num { color: var(--folga); }

  /* ── CONTROLS ── */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 40px 0;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .view-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 16px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .02em;
  }
  .view-btn:hover { border-color: var(--muted); color: var(--text); }
  .view-btn.active { background: #1E2230; border-color: var(--work); color: var(--work); }

  .filter-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-left: 10px;
  }
  .filter-btn {
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid;
    font-family: var(--font-body);
    letter-spacing: .02em;
  }
  .filter-btn[data-cat="all"]   { border-color: var(--muted); color: var(--text-dim); background: transparent; }
  .filter-btn[data-cat="work"]  { border-color: rgba(74,144,217,.4); color: var(--work); background: var(--work-bg); }
  .filter-btn[data-cat="dsr"]   { border-color: rgba(139,111,212,.4); color: var(--dsr); background: var(--dsr-bg); }
  .filter-btn[data-cat="comp"]  { border-color: rgba(232,168,56,.4); color: var(--comp); background: var(--comp-bg); }
  .filter-btn[data-cat="folga"] { border-color: rgba(61,189,143,.4); color: var(--folga); background: var(--folga-bg); }
  .filter-btn.active { box-shadow: 0 0 0 2px currentColor; }

  /* ── MAIN ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 40px 60px;
  }

  /* ── CALENDAR VIEW ── */
  .month-block { margin-bottom: 40px; }
  .month-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text-hi);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day-header {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 6px 0;
  }
  .cal-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 8px 7px;
    min-height: 68px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color .15s;
    cursor: default;
  }
  .cal-cell:hover { border-color: var(--muted); }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-cell.is-today { border-color: var(--today) !important; box-shadow: 0 0 0 1px var(--today); }
  .cal-num {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
  }
  .cal-cell.is-today .cal-num { color: var(--today); font-weight: 600; }
  .cal-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    align-self: flex-start;
    margin-top: auto;
  }
  .cat-work  .cal-badge { background: var(--work-bg);  color: var(--work); }
  .cat-dsr   .cal-badge { background: var(--dsr-bg);   color: var(--dsr); }
  .cat-comp  .cal-badge { background: var(--comp-bg);  color: var(--comp); }
  .cat-folga .cal-badge { background: var(--folga-bg); color: var(--folga); }
  .cat-outros .cal-badge { background: var(--outros-bg); color: var(--outros); }

  /* ── LIST VIEW ── */
  .list-view { display: flex; flex-direction: column; gap: 4px; }
  .list-month-sep {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--text-hi);
    padding: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .list-month-sep::after { content:''; flex:1; height:1px; background:var(--border); }
  .list-item {
    display: grid;
    grid-template-columns: 48px 80px 1fr auto;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    transition: border-color .15s;
  }
  .list-item:hover { border-color: var(--muted); }
  .list-item.is-today { border-color: var(--today); }
  .list-day-num {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text-hi);
    line-height: 1;
  }
  .list-item.is-today .list-day-num { color: var(--today); }
  .list-weekday {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .list-label { font-size: 13px; color: var(--text); font-weight: 400; }
  .list-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .cat-work  .list-badge { background: var(--work-bg);  color: var(--work); }
  .cat-dsr   .list-badge { background: var(--dsr-bg);   color: var(--dsr); }
  .cat-comp  .list-badge { background: var(--comp-bg);  color: var(--comp); }
  .cat-folga .list-badge { background: var(--folga-bg); color: var(--folga); }
  .cat-outros .list-badge { background: var(--outros-bg); color: var(--outros); }

  /* ── VACATION BANNER ── */
  .vacation-banner {
    background: linear-gradient(120deg, rgba(61,189,143,.1), rgba(139,111,212,.08));
    border: 1px solid rgba(61,189,143,.25);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .vac-icon { font-size: 28px; }
  .vac-text h3 {
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--folga);
    margin-bottom: 2px;
  }
  .vac-text p { font-size: 12px; color: var(--text-dim); }

  /* responsive */
  @media (max-width: 700px) {
    header, .stats-bar, .controls, main { padding-left: 16px; padding-right: 16px; }
    .cal-cell { min-height: 50px; padding: 5px; }
    .cal-badge { font-size: 7px; padding: 1px 4px; }
    .list-item { grid-template-columns: 36px 60px 1fr; }
    .list-badge { display: none; }
  }
</style>
</head>

  const counts = { work:0, folga:0 };
  data.forEach(d => {
    if (d.cat === 'work') counts.work++;
    else if (['dsr','comp','folga'].includes(d.cat)) counts.folga++;
  });
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card c-work">
      <div class="s-num">${counts.work}</div>
      <div class="s-label">Dias de trabalho</div>
    </div>
    <div class="stat-card c-folga">
      <div class="s-num">${counts.folga}</div>
      <div class="s-label">Folgas (DSR + Comp. + FF)</div>
    </div>
  `;
}

function countdown() {
  const vacDate = new Date('2026-08-31');
  const todayD  = new Date(TODAY);
  const diff = Math.round((vacDate - todayD) / 86400000);
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : 0;
}

function filtered() {
  if (currentFilter === 'all') return SCHEDULE;
  if (currentFilter === 'folga') return SCHEDULE.filter(d => ['dsr','comp','folga'].includes(d.cat));
  return SCHEDULE.filter(d => d.cat === currentFilter);
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const data = filtered();
  buildStats(data);
  if (currentView === 'calendar') renderCalendar(data);
  else renderList(data);
}

function renderCalendar(data) {
  const byDate = {};
  data.forEach(d => byDate[d.date] = d);

  // Group months
  const months = {};
  SCHEDULE.forEach(d => {
    const key = `${d.year}-${d.month}`;
    if (!months[key]) months[key] = { year: d.year, month: d.month, days: [] };
    months[key].days.push(d);
  });

  let html = '';
  Object.values(months).forEach(({ year, month, days }) => {
    const mName = MONTHS[month - 1];
    html += `<div class="month-block"><div class="month-title">${mName} ${year}</div>`;
    html += `<div class="cal-grid">`;
    // headers
    WDAYS.forEach(w => html += `<div class="cal-day-header">${w}</div>`);

    // first day of month offset
    const firstDay = new Date(year, month - 1, 1).getDay();
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;

    // all days in month
    const daysInMonth = new Date(year, month, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry   = byDate[dateStr];
      const isToday = dateStr === TODAY;
      const inRange = SCHEDULE.find(x => x.date === dateStr);

      if (!inRange) {
        html += `<div class="cal-cell"><div class="cal-num" style="color:var(--muted)">${d}</div></div>`;
        continue;
      }
      if (!entry) {
        // filtered out
        html += `<div class="cal-cell"><div class="cal-num" style="color:var(--muted)">${d}</div></div>`;
        continue;
      }
      html += `<div class="cal-cell cat-${entry.cat}${isToday ? ' is-today' : ''}">
        <div class="cal-num">${d}</div>
        <div class="cal-badge">${entry.cat === 'work' ? 'Trab.' : ['dsr','comp','folga'].includes(entry.cat) ? 'Folga' : entry.label}</div>
      </div>`;
    }
    html += `</div></div>`;
  });

  // vacation banner
  html += `<div class="vacation-banner">
    <div class="vac-icon">🏖</div>
    <div class="vac-text">
      <h3>Férias a partir de 31 de agosto</h3>
      <p>Aproveite bem o descanso — você chegou ao fim da escala!</p>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function renderList(data) {
  if (!data.length) {
    document.getElementById('main').innerHTML = `<p style="color:var(--text-dim);text-align:center;margin-top:40px">Nenhum dia com este filtro.</p>`;
    return;
  }

  // group by month
  const groups = {};
  data.forEach(d => {
    const key = `${d.year}-${d.month}`;
    if (!groups[key]) groups[key] = { year: d.year, month: d.month, items: [] };
    groups[key].items.push(d);
  });

  let html = '<div class="list-view">';
  Object.values(groups).forEach(({ year, month, items }) => {
    html += `<div class="list-month-sep">${MONTHS[month-1]} ${year}</div>`;
    items.forEach(d => {
      const isToday = d.date === TODAY;
      html += `<div class="list-item cat-${d.cat}${isToday ? ' is-today' : ''}">
        <div class="list-day-num">${String(d.day).padStart(2,'0')}</div>
        <div class="list-weekday">${d.weekday}${isToday ? ' · hoje' : ''}</div>
        <div class="list-label">${labelText(d)}</div>
        <div class="list-badge">${d.cat === 'work' ? 'Trabalho' : ['dsr','comp','folga'].includes(d.cat) ? 'Folga' : d.label}</div>
      </div>`;
    });
  });
  html += '</div>';

  html += `<div class="vacation-banner" style="margin-top:32px">
    <div class="vac-icon">🏖</div>
    <div class="vac-text">
      <h3>Férias a partir de 31 de agosto</h3>
      <p>Aproveite bem o descanso — você chegou ao fim da escala!</p>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

countdown();
render();
</script>
</body>
</html>
