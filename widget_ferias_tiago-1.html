<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Férias</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:24px;border-radius:20px;text-align:center;width:90%;max-width:360px}
.days{font-size:72px;font-weight:bold}
.progress{height:12px;background:#334155;border-radius:10px;overflow:hidden;margin-top:16px}
.bar{height:100%;background:#22c55e;width:0%}
.small{color:#cbd5e1;margin-top:12px}
</style>
</head>
<body>
<div class="card">
<h1>🏖️ Férias 2026</h1>
<div id="days" class="days">0</div>
<div>Dias restantes</div>
<div class="progress"><div id="bar" class="bar"></div></div>
<div id="percent" class="small"></div>
<div class="small">Início das férias: 31/08/2026</div>
</div>
<script>
const startDate=new Date('2026-06-17');
const vacationDate=new Date('2026-08-31');
function update(){
 const now=new Date();
 const total=Math.ceil((vacationDate-startDate)/(1000*60*60*24));
 const remaining=Math.max(0,Math.ceil((vacationDate-now)/(1000*60*60*24)));
 const progress=Math.max(0,Math.min(100,((total-remaining)/total)*100));
 document.getElementById('days').textContent=remaining;
 document.getElementById('bar').style.width=progress+'%';
 document.getElementById('percent').textContent=progress.toFixed(1)+'% concluído';
}
update();
</script>
</body>
</html>
